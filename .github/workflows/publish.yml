name: Publish to npm

# Publishes whenever you create a GitHub Release. Uses npm trusted publishing
# (OIDC): no tokens stored, and npm auto-generates a provenance attestation.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish
